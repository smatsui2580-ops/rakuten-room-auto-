name: 楽天ROOM自動フォロー

on:
  schedule:
    - cron: '0 1 * * *'    # 10:00 JST
    - cron: '0 5 * * *'    # 14:00 JST
    - cron: '0 9 * * *'    # 18:00 JST
    - cron: '0 13 * * *'   # 22:00 JST
  workflow_dispatch:

jobs:
  follow:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: ログ・データフォルダを作成
        run: mkdir -p logs data

      - name: クッキーをSecretsから復元
        env:
          RAKUTEN_COOKIES: ${{ secrets.RAKUTEN_COOKIES }}
        run: |
          printf '%s' "$RAKUTEN_COOKIES" > data/rakuten_cookies.json
          python3 -c "import json; data=json.load(open('data/rakuten_cookies.json')); print(f'クッキー読み込み確認: {len(data)}件')"

      - name: 自動フォローを実行（50件）
        env:
          RAKUTEN_EMAIL: ${{ secrets.RAKUTEN_EMAIL }}
          RAKUTEN_PASSWORD: ${{ secrets.RAKUTEN_PASSWORD }}
          CI: "true"
        run: python main.py --follow

      - name: クッキーをSecretsに更新（自動ログイン後に更新された場合）
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_TOKEN" ] && [ -f data/rakuten_cookies.json ]; then
            python3 -c "import json; data=json.load(open('data/rakuten_cookies.json')); print(f'クッキー件数: {len(data)}件')" && \
            gh secret set RAKUTEN_COOKIES < data/rakuten_cookies.json && \
            echo "クッキーをSecretsに更新しました" || echo "クッキー更新スキップ"
          else
            echo "GH_PAT未設定のためクッキー更新スキップ"
          fi

      - name: フォロー履歴をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/followed_users.json || true
          git diff --staged --quiet || git commit -m "フォロー履歴更新 $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push

      - name: ログをアップロード（確認用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: follow-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
